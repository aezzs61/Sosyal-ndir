<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyalindir - Video İndirme Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <span class="maroon">Sosyal</span><span class="blue">indir</span>
        </div>
        <p>YouTube video linkini yapıştırın</p>
        
        <div class="input-area">
            <input type="text" id="videoLink" placeholder="YouTube linkini buraya yapıştırın...">
            <button id="downloadBtn">Videoyu Yakala</button>
        </div>

        <div id="resultArea" class="result-box" style="display: none;">
            <h3>Video İndirilmeye Hazır!</h3>
            <a id="saveBtn" href="#" target="_blank" download>Cihaza Kaydet (MP4)</a>
        </div>

        <div class="guide-box">
            <h4>Link Nasıl Alınır?</h4>
            <ul>
                <li>Videoyu açıp <strong>Paylaş</strong> butonuna dokunun.</li>
                <li><strong>Bağlantıyı Kopyala</strong> seçeneğine tıklayın.</li>
                <li>Kopyaladığınız linki yukarıdaki kutuya yapıştırın.</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
